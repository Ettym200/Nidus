name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          cp build/app/outputs/flutter-apk/app-release.apk "dist/Nidus-v${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: nidus-apk
          path: dist/*.apk
          if-no-files-found: error
